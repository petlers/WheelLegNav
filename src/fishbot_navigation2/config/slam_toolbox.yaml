slam_toolbox:
  ros__parameters:
    use_sim_time: false

    # Frames/topics must match fishbot_bringup
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan
    odom_topic: /odom

    mode: mapping               # online mapping with loop closure
    resolution: 0.05
    max_laser_range: 25.0
    minimum_time_interval: 0.5
    transform_publish_period: 0.02
    map_update_interval: 3.0

    solve_every_n_frames: 1
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.17
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 15.0
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_search_num_submaps: 5
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_maximum_variance_fine: 0.1
    loop_match_maximum_iterations: 10

    # serialization options help build maps incrementally if needed
    enable_interactive_mode: false
    serialization_file_path: /tmp/fishbot_slam_toolbox
